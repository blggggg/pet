<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>宠物维护</title>
    <style>
        body{font-family:Arial,"Microsoft YaHei",sans-serif;margin:30px;color:#222}
        .wrap{max-width:900px;margin:0 auto}
        h2{font-size:34px;margin:18px 0}
        .card{border:1px solid #d8dee9;border-radius:10px;padding:24px}
        .row{display:grid;grid-template-columns:120px 1fr;gap:14px;align-items:center;margin-bottom:16px}
        input[type=text],input[type=number],select,textarea{width:100%;padding:10px;border:1px solid #ccc;border-radius:6px;box-sizing:border-box}
        textarea{min-height:90px}
        img.preview{width:140px;height:140px;object-fit:cover;border:1px solid #ddd;border-radius:8px}
        .actions button,.actions a{display:inline-block;padding:10px 18px;border-radius:6px;border:1px solid #1f5aa6;background:#1f5aa6;color:#fff;text-decoration:none;cursor:pointer}
        .actions a{background:#fff;color:#1f5aa6;margin-left:10px}
    </style>
</head>
<body>
<div class="wrap">
    <a href="/pet/list">← 返回列表</a>
    <h2>宠物维护</h2>

    <div class="card">
        <form th:action="${formAction}" method="post" enctype="multipart/form-data" th:object="${pet}">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{imageUrl}">

            <div class="row">
                <label>名称</label>
                <input type="text" th:field="*{name}" required>
            </div>

            <div class="row">
                <label>类型</label>
                <input type="text" th:field="*{type}" placeholder="如：狗 / 猫">
            </div>

            <div class="row">
                <label>年龄</label>
                <input type="number" th:field="*{age}" min="0">
            </div>

            <div class="row">
                <label>性别</label>
                <select th:field="*{gender}">
                    <option value="">请选择</option>
                    <option value="公">公</option>
                    <option value="母">母</option>
                </select>
            </div>

            <div class="row">
                <label>品种</label>
                <input type="text" th:field="*{breed}">
            </div>

            <div class="row">
                <label>主人</label>
                <input type="text" th:field="*{owner}">
            </div>

            <div class="row">
                <label>备注</label>
                <textarea th:field="*{remark}"></textarea>
            </div>

            <div class="row">
                <label>当前图片</label>
                <div>
                    <img class="preview"
                         th:src="${#strings.isEmpty(pet.imageUrl) ? '/images/default-pet.png' : pet.imageUrl}"
                         alt="pet">
                </div>
            </div>

            <div class="row">
                <label>上传图片</label>
                <input type="file" name="imageFile" accept="image/*">
            </div>

            <div class="actions">
                <button type="submit">保存</button>
                <a href="/pet/list">取消</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
