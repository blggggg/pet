<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>宠物详情</title>
    <style>
        body {
            font-family: Arial, "Microsoft YaHei", sans-serif;
            margin: 30px;
            color: #222;
            background: #f4f6f8;
        }

        a {
            text-decoration: none;
            color: #1f5aa6;
        }

        .wrap {
            max-width: 980px;
            margin: 0 auto;
        }

        .profile-header {
            margin-bottom: 22px;
        }

        .profile-header h1 {
            font-size: 38px;
            margin: 0 0 8px;
            font-weight: 700;
        }

        .profile-header p {
            margin: 0;
            color: #666;
            font-size: 16px;
        }

        .card {
            border: 1px solid #d8dee9;
            border-radius: 14px;
            padding: 24px;
            background: #fff;
            box-shadow: 0 4px 14px rgba(0,0,0,0.04);
        }

        .grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 30px;
        }

        .image-box img {
            width: 300px;
            height: 300px;
            object-fit: cover;
            border-radius: 14px;
            border: 1px solid #ddd;
        }

        .info-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 14px;
        }

        .row {
            display: flex;
            padding: 11px 0;
            border-bottom: 1px dashed #eee;
        }

        .label {
            width: 110px;
            color: #666;
        }

        .value {
            flex: 1;
            color: #222;
            font-weight: 500;
        }

        .action {
            margin-top: 22px;
            text-align: right;
        }

        .btn {
            display: inline-block;
            padding: 9px 18px;
            border-radius: 6px;
            border: 1px solid #1877f2;
            margin-left: 10px;
        }

        .btn-primary {
            background: #1877f2;
            color: #fff;
        }

        .btn-outline {
            background: #fff;
            color: #1877f2;
        }

        .feed-section {
            margin-top: 26px;
            padding: 24px;
            border: 1px solid #d8dee9;
            border-radius: 14px;
            background: #fff;
            box-shadow: 0 4px 14px rgba(0,0,0,0.04);
        }

        .feed-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }

        .feed-header h2 {
            font-size: 24px;
            margin: 0;
        }

        .feed-tip {
            font-size: 13px;
            color: #888;
        }

        .feed-item {
            display: flex;
            gap: 16px;
            padding: 18px 0;
            border-bottom: 1px solid #eee;
        }

        .feed-item:last-child {
            border-bottom: none;
        }

        .feed-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #eef4ff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .feed-content {
            flex: 1;
        }

        .feed-title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .feed-time {
            font-size: 13px;
            color: #888;
            margin-bottom: 8px;
        }

        .feed-desc {
            font-size: 15px;
            color: #555;
            line-height: 1.6;
        }
    </style>
</head>
<body>
<div class="wrap">

    <div class="profile-header">
        <h1 th:text="${pet.name}">凯凯</h1>
        <p>
            <span th:text="${pet.type}">狗</span>
            ·
            <span th:text="${pet.breed}">柴犬</span>
            ·
            <span th:text="${pet.age}">10</span>岁
        </p>
    </div>

    <div class="card">
        <div class="grid">
            <div class="image-box">
                <img th:src="${#strings.isEmpty(pet.imageUrl) ? '/images/default-pet.png' : pet.imageUrl}" alt="pet">
            </div>

            <div>
                <div class="info-title">基础信息</div>

                <div class="row">
                    <div class="label">ID</div>
                    <div class="value" th:text="${pet.id}">1</div>
                </div>

                <div class="row">
                    <div class="label">名称</div>
                    <div class="value" th:text="${pet.name}">凯凯</div>
                </div>

                <div class="row">
                    <div class="label">类型</div>
                    <div class="value" th:text="${pet.type}">狗</div>
                </div>

                <div class="row">
                    <div class="label">年龄</div>
                    <div class="value" th:text="${pet.age}">10</div>
                </div>

                <div class="row">
                    <div class="label">性别</div>
                    <div class="value" th:text="${pet.gender}">公</div>
                </div>

                <div class="row">
                    <div class="label">品种</div>
                    <div class="value" th:text="${pet.breed}">柴犬</div>
                </div>

                <div class="row">
                    <div class="label">主人</div>
                    <div class="value" th:text="${pet.owner}">张三</div>
                </div>

                <div class="row">
                    <div class="label">备注</div>
                    <div class="value" th:text="${pet.remark}">已接种疫苗</div>
                </div>

                <div class="action">
                    <a class="btn btn-primary" th:href="@{'/pet/toEdit/' + ${pet.id}}">编辑</a>
                    <a class="btn btn-outline" href="/pet/list">返回列表</a>
                </div>
            </div>
        </div>
    </div>

    <div class="feed-section">
        <div class="feed-header">
            <h2>宠物动态</h2>
            <div class="feed-tip">Recent Activity</div>
        </div>

        <div class="feed-item">
            <div class="feed-icon">💉</div>
            <div class="feed-content">
                <div class="feed-title">
                    <span th:text="${pet.name}">凯凯</span> 已完成疫苗接种
                </div>
                <div class="feed-time">2026-06-20 10:30</div>
                <div class="feed-desc">年度疫苗接种已完成，宠物状态正常。</div>
            </div>
        </div>

        <div class="feed-item">
            <div class="feed-icon">📷</div>
            <div class="feed-content">
                <div class="feed-title">
                    上传了一张新的宠物照片
                </div>
                <div class="feed-time">2026-06-18 15:20</div>
                <div class="feed-desc">更新了宠物详情页展示图片，方便主人查看最新状态。</div>
            </div>
        </div>

        <div class="feed-item">
            <div class="feed-icon">🛁</div>
            <div class="feed-content">
                <div class="feed-title">
                    完成洗澡护理
                </div>
                <div class="feed-time">2026-06-15 09:00</div>
                <div class="feed-desc">已完成基础清洁护理，毛发状态良好。</div>
            </div>
        </div>

        <div class="feed-item">
            <div class="feed-icon">📝</div>
            <div class="feed-content">
                <div class="feed-title">
                    备注信息已更新
                </div>
                <div class="feed-time">2026-06-10 18:00</div>
                <div class="feed-desc" th:text="${pet.remark}">已接种疫苗</div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
