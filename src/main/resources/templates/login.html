<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 宠物管理系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-body">
<div class="login-card">
    <h1>宠物管理系统</h1>
    <p class="sub-title">MySQL + Session 登录方案</p>

    <div class="message error" th:if="${errorMsg}" th:text="${errorMsg}"></div>

    <form action="/doLogin" method="post" class="form-panel">
        <div class="form-group">
            <label>用户名</label>
            <input type="text" name="username" th:value="${username}" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" name="password" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="btn btn-primary full-width">登录</button>
    </form>

    <div class="tips-box">
        <div>默认账号：admin</div>
        <div>默认密码：123456</div>
    </div>
</div>
</body>
</html>
